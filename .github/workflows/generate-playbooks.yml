name: Generate Playbook PPTXs and PDFs

on:
  push:
    branches: [main]
    paths:
      - "content/**.yaml"        # Only runs when a YAML file changes
      - "scripts/generate_pptx.js"  # Or when the generator itself changes

  workflow_dispatch:             # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate all playbooks
        run: node scripts/generate_pptx.js content/

      - name: Install LibreOffice for PDF conversion
        run: sudo apt-get update && sudo apt-get install -y libreoffice

      - name: Convert PPTX to PDF
        run: |
          cd output
          for file in *.pptx; do
            libreoffice --headless --convert-to pdf "$file"
          done

      - name: Commit generated PPTXs and PDFs back to repo
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: regenerate playbook PPTXs and PDFs [skip ci]"
          file_pattern: "output/*"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
